<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>POS Terminal</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;padding:20px;background-color:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}.terminal-body{background:#2b2c30;padding:20px 20px 40px 20px;border-radius:24px;box-shadow:0 25px 50px rgba(0,0,0,0.6),inset 0 2px 4px rgba(255,255,255,0.1);border:2px solid #3d3e44;position:relative;}.sber-screen{background:#ffffff;border-radius:12px;text-align:center;width:280px;height:380px;user-select:none;display:flex;flex-direction:column;justify-content:space-between;align-items:center;overflow:hidden;box-shadow:inset 0 3px 10px rgba(0,0,0,0.3);position:relative;}.terminal-header{width:100%;background:#212224;color:#ffffff;padding:10px 0;font-size:14px;font-weight:600;letter-spacing:1px;display:flex;justify-content:center;align-items:center;gap:6px;border-bottom:3px solid #21a038;}.header-dot{width:8px;height:8px;background:#21a038;border-radius:50%;}.terminal-main{flex-grow:1;display:flex;flex-direction:column;justify-content:center;align-items:center;width:100%;padding:20px;box-sizing:border-box;}.status-text{color:#333333;font-size:20px;font-weight:600;margin:0 0 15px 0;}.amount-display{font-size:38px;font-weight:700;margin:10px 0;color:#111111;}.contactless-icon{margin-bottom:25px;opacity:0.7;}.spinner{width:50px;height:50px;border:5px solid #f3f3f3;border-top:5px solid #21a038;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}.success-bg{background:#21a038;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;animation:fadeIn 0.3s ease-out;}.success-title{font-size:24px;font-weight:700;letter-spacing:0.5px;margin-top:15px;}@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}.terminal-footer{width:100%;font-size:11px;color:#888888;padding-bottom:12px;font-weight:500;}#wait-box,#process-box,#auth-box,#success-box{width:100%;height:100%;display:none;}.secret-bolt-trigger{position:absolute;bottom:12px;right:25px;width:16px;height:16px;background:#4e5057;border:2px solid #222325;border-radius:50%;cursor:pointer;z-index:1000;box-shadow:inset 1px 1px 2px rgba(255,255,255,0.2),0 2px 4px rgba(0,0,0,0.4);display:flex;justify-content:center;align-items:center;}.secret-bolt-trigger::before {content:"";width:10px;height:2px;background:#222325;transform:rotate(45deg);}.admin-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222222;color:white;padding:20px;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,0.7);width:240px;z-index:9999;border:1px solid #444;}.admin-panel label{font-size:13px;color:#bbbbbb;}.admin-panel input{width:100%;padding:10px;margin:8px 0 12px 0;box-sizing:border-box;border:1px solid #444;background:#111;border-radius:6px;color:#fff;font-size:16px;outline:none;}.admin-panel button{width:100%;padding:11px;background:#21a038;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:6px;font-size:14px;}.admin-panel button.process-btn{background:#007bff;}.admin-panel button.reset-btn{background:#dc3545;}</style></head><body><div class="terminal-body"><div class="sber-screen"><div class="terminal-header"><div class="header-dot"></div><span>СБЕРБАНК</span></div><div class="terminal-main"><div id="wait-box" style="display:block;"><div class="contactless-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#21a038" stroke-width="2.5" stroke-linecap="round"><path d="M5 12a7 7 0 0 1 7-7v0"/><path d="M5 15a10 10 0 0 1 10-10v0"/><path d="M5 18a13 13 0 0 1 13-13v0"/><circle cx="5" cy="9" r="1" fill="#21a038"/></svg></div><p class="status-text">Приложите карту</p><div class="amount-display"><span class="display-sum">0.00</span> €</div></div><div id="process-box"><div class="spinner"></div><p class="status-text" style="color:#007bff;">Обрабатывается...</p><div class="amount-display"><span class="display-sum">0.00</span> €</div></div><div id="auth-box"><div class="spinner" style="border-top-color:#ffc107;"></div><p class="status-text" style="color:#b58900;">Авторизация...</p><div class="amount-display"><span class="display-sum">0.00</span> €</div></div><div id="success-box"><div class="success-bg"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><div class="success-title">СПАСИБО</div><p style="font-size:14px;margin-top:5px;opacity:0.9;">ОПЛАЧЕНО</p></div></div></div><div class="terminal-footer" id="termFooter">Вставьте или приложите карту</div></div><div class="secret-bolt-trigger" onclick="toggleAdminPanel()"></div></div><div class="admin-panel" id="adminPanel"><h4 style="margin:0 0 10px 0;text-align:center;font-size:15px;">Панель Кассира</h4><label>Сумма заказа (€):</label><input type="number" id="inputSum" placeholder="0.00" value="0"><button onclick="localSetSum()">Записать сумму</button><button class="process-btn" onclick="startPaymentChain()">Запустить процесс</button><button class="reset-btn" onclick="localResetTerminal()">Сбросить всё</button></div><script>function toggleAdminPanel(){const panel=document.getElementById('adminPanel');panel.style.display=(panel.style.display==='block')?'none':'block';}function clearDisplay(){document.getElementById('wait-box').style.display='none';document.getElementById('process-box').style.display='none';document.getElementById('auth-box').style.display='none';document.getElementById('success-box').style.display='none';}function updateSumDisplays(sum){const elements=document.getElementsByClassName('display-sum');const formattedSum=parseFloat(sum).toFixed(2);for(let i=0;i<elements.length;i++){elements[i].innerText=formattedSum;}}function localSetSum(){const sum=document.getElementById('inputSum').value||"0";updateSumDisplays(sum);clearDisplay();document.getElementById('wait-box').style.display='block';document.getElementById('termFooter').style.display='block';document.getElementById('termFooter').innerText="Вставьте или приложите карту";toggleAdminPanel();}function startPaymentChain(){const sum=document.getElementById('inputSum').value||"0";updateSumDisplays(sum);toggleAdminPanel();clearDisplay();document.getElementById('wait-box').style.display='block';document.getElementById('termFooter').innerText="Чтение карты...";setTimeout(function(){clearDisplay();document.getElementById('process-box').style.display='block';document.getElementById('termFooter').innerText="Не извлекайте карту";setTimeout(function(){clearDisplay();document.getElementById('auth-box').style.display='block';document.getElementById('termFooter').innerText="Связь с банком...";setTimeout(function(){clearDisplay();document.getElementById('success-box').style.display='block';document.getElementById('termFooter').style.display='none';},5000);},5000);},5000);}function localResetTerminal(){document.getElementById('inputSum').value="0";updateSumDisplays("0");clearDisplay();document.getElementById('wait-box').style.display='block';document.getElementById('termFooter').style.display='block';document.getElementById('termFooter').innerText="Вставьте или приложите карту";toggleAdminPanel();}</script></body></html>
