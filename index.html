<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбер-Терминал</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Экран Сбер-Терминала */
        .sber-screen {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
            user-select: none;
        }
        .sber-logo {
            color: #21a038;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .status-wait { color: #555; font-size: 18px; }
        .status-success { color: #21a038; font-size: 22px; font-weight: bold; display: none; }
        .amount-display { font-size: 32px; font-weight: bold; margin: 20px 0; color: #333; }
        
        /* Скрытая кнопка 50х50 пикселей в самом нижнем правом углу */
        .secret-trigger {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            background: transparent;
            cursor: pointer;
            z-index: 1000;
        }

        /* Скрытая панель управления */
        .admin-panel {
            display: none;
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 200px;
            z-index: 999;
        }
        .admin-panel input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
            border: none;
            border-radius: 4px;
            color: #000;
            font-size: 16px;
        }
        .admin-panel button {
            width: 100%;
            padding: 10px;
            background: #21a038;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
        .admin-panel button.pay-btn { background: #007bff; }
        .admin-panel button.reset-btn { background: #dc3545; }
    </style>
</head>
<body>

    <!-- Главный экран терминала -->
    <div class="sber-screen">
        <div class="sber-logo">СБЕР</div>
        <div id="wait-box">
            <p class="status-wait">Ожидание оплаты...</p>
            <div class="amount-display"><span id="display-sum">0</span> ₽</div>
        </div>
        <div id="success-box" class="status-success">
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            УСПЕШНО ОПЛАЧЕНО
        </div>
    </div>

    <!-- Полностью прозрачный квадрат в самом углу для вызова админки -->
    <div class="secret-trigger" onclick="toggleAdminPanel()"></div>

    <!-- Панель управления -->
    <div class="admin-panel" id="adminPanel">
        <h4 style="margin: 0 0 10px 0; text-align: center;">Управление</h4>
        <label>Сумма к оплате:</label>
        <input type="number" id="inputSum" placeholder="Введите сумму" value="0">
        <button onclick="localSetSum()">Установить сумму</button>
        <button class="pay-btn" onclick="localTriggerPayment()">Подтвердить Оплату</button>
        <button class="reset-btn" onclick="localResetTerminal()">Сбросить</button>
    </div>

    <script>
        // Функция открытия/закрытия панели по клику в угол
        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        // Локальная установка суммы (только для текущего экрана)
        function localSetSum() {
            const sum = document.getElementById('inputSum').value || "0";
            document.getElementById('display-sum').innerText = sum;
            
            // Возвращаем экран в режим ожидания, если была показана успешная оплата
            document.getElementById('wait-box').style.display = 'block';
            document.getElementById('success-box').style.display = 'none';
        }

        // Локальное включение успешной оплаты
        function localTriggerPayment() {
            document.getElementById('wait-box').style.display = 'none';
            document.getElementById('success-box').style.display = 'block';
        }

        // Локальный сброс экрана в ноль
        function localResetTerminal() {
            document.getElementById('inputSum').value = "0";
            document.getElementById('display-sum').innerText = "0";
            document.getElementById('wait-box').style.display = 'block';
            document.getElementById('success-box').style.display = 'none';
        }
    </script>
</body>
</html>
